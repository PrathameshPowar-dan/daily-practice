<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Practice</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <h1>Interview Practice</h1>
        <p>MCQ + Coding Practice</p>
    </header>

    <main>
        <div class="tabs">
            <button onclick="showTab('mcq')" class="active">MCQ</button>
            <button onclick="showTab('coding')">Coding</button>
        </div>

        <!-- MCQ SECTION -->
        <section id="mcq" class="tab-content active">
            <div id="mcq-container"></div>
            <button onclick="submitMCQ()">Submit</button>
            <p id="mcq-result"></p>
        </section>

        <!-- CODING SECTION -->
        <section id="coding" class="tab-content">
            <div id="coding-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
